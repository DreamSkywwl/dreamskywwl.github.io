<!-- 
根据以下内容生成html 
1、生成一个时间戳，旁边一个可以触发复制功能的按钮（复制后自动刷新）,不需要实时刷新
2、生成时间字符串，按照YYYYMMDDHHmmss格式，旁边一个可以触发复制功能的按钮（复制后自动刷新），不需要实时刷新
3、随机生成12位密码，使用字符可以包括为a~z、A~Z、0~9，可输入排除字符（复制后自动刷新）
4、一个可以刷新以上功能的按钮
5、
限制：
1、不能使用tailwindcss，
2、link使用国内镜像
3、不使用图标
4、禁止使用字体
 -->

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实用工具箱</title>
    <!-- 使用国内镜像引入 Bootstrap CSS -->
    <link
      href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        font-family: 'Microsoft YaHei', 'SimHei', sans-serif; /* 禁止商业字体，使用系统默认 */
        padding-top: 50px;
      }
      .tool-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 20px;
        margin-bottom: 20px;
        transition: transform 0.2s;
      }
      .tool-card:hover {
        transform: translateY(-2px);
      }
      .result-box {
        background-color: #e9ecef;
        border: 1px solid #ced4da;
        border-radius: 5px;
        padding: 10px;
        font-family: monospace;
        font-size: 1.2em;
        color: #333;
        word-break: break-all;
        min-height: 46px;
        display: flex;
        align-items: center;
      }
      .btn-group-custom {
        display: flex;
        gap: 10px;
      }
      .header-title {
        text-align: center;
        margin-bottom: 30px;
        color: #343a40;
      }
      .refresh-all-btn {
        width: 100%;
        padding: 15px;
        font-size: 1.1em;
        margin-top: 20px;
      }
      /* 简单的 Toast 提示样式 */
      #toast {
        visibility: hidden;
        min-width: 250px;
        background-color: #333;
        color: #fff;
        text-align: center;
        border-radius: 5px;
        padding: 16px;
        position: fixed;
        z-index: 1;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        font-size: 17px;
      }
      #toast.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
      }
      @keyframes fadein {
        from {
          bottom: 0;
          opacity: 0;
        }
        to {
          bottom: 30px;
          opacity: 1;
        }
      }
      @keyframes fadeout {
        from {
          bottom: 30px;
          opacity: 1;
        }
        to {
          bottom: 0;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
     

      <!-- 1. 时间戳生成器 -->
      <div class="tool-card">
        <h4>当前时间戳 (Unix Timestamp)</h4>
        <p class="text-muted small">单位：秒</p>
        <div class="row align-items-center">
          <div class="col-md-10 col-sm-12 mb-3 mb-md-0">
            <div id="timestamp-display" class="result-box">Loading...</div>
          </div>
          <div class="col-md-2 col-sm-12">
            <div class="btn-group-custom">
              <button
                class="btn btn-outline-secondary flex-fill"
                onclick="copyToClipboard('timestamp-display')"
              >
                复制
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 2. 格式化时间字符串 -->
      <div class="tool-card">
        <h4>格式化时间 (YYYYMMDDHHmmss)</h4>
        <div class="row align-items-center">
          <div class="col-md-10 col-sm-12 mb-3 mb-md-0">
            <div id="formatted-time-display" class="result-box">Loading...</div>
          </div>
          <div class="col-md-2 col-sm-12">
            <div class="btn-group-custom">
              
              <button
                class="btn btn-outline-secondary flex-fill"
                onclick="copyToClipboard('formatted-time-display')"
              >
                复制
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 3. 随机密码生成器 -->
      <div class="tool-card">
        <h4>随机密码生成 (12位)</h4>
        <div class="mb-3">
          <label for="exclude-chars" class="form-label">排除字符 (可选):</label>
          <input
            type="text"
            class="form-control"
            id="exclude-chars"
            placeholder="例如: oO0l1I (容易混淆的字符)"
          />
        </div>
        <div class="row align-items-center">
          <div class="col-md-10 col-sm-12 mb-3 mb-md-0">
            <div id="password-display" class="result-box">Loading...</div>
          </div>
          <div class="col-md-2 col-sm-12">
            <div class="btn-group-custom">
              <button
                class="btn btn-outline-secondary flex-fill"
                onclick="copyToClipboard('password-display')"
              >
                复制
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 4. 全局刷新按钮 -->
      <button class="btn btn-success refresh-all-btn" onclick="refreshAll()">刷新所有数据</button>
    </div>

    <!-- Toast 提示框 -->
    <div id="toast">已复制到剪贴板</div>

    <!-- 使用国内镜像引入 Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script>
      // 初始化
      document.addEventListener('DOMContentLoaded', function () {
        refreshAll()
      })

      // 1. 刷新时间戳
      function refreshTimestamp() {
        const now = Math.floor(Date.now() / 1000)
        document.getElementById('timestamp-display').innerText = now
      }

      // 2. 刷新格式化时间 YYYYMMDDHHmmss
      function refreshFormattedTime() {
        const now = new Date()
        const year = now.getFullYear()
        const month = String(now.getMonth() + 1).padStart(2, '0')
        const day = String(now.getDate()).padStart(2, '0')
        const hours = String(now.getHours()).padStart(2, '0')
        const minutes = String(now.getMinutes()).padStart(2, '0')
        const seconds = String(now.getSeconds()).padStart(2, '0')

        const timeString = `${year}${month}${day}${hours}${minutes}${seconds}`
        document.getElementById('formatted-time-display').innerText = timeString
      }

      // 3. 刷新密码
      function refreshPassword() {
        const length = 12
        const excludeInput = document.getElementById('exclude-chars').value
        const excludeSet = new Set(excludeInput.split(''))

        const lower = 'abcdefghijklmnopqrstuvwxyz'
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
        const numbers = '0123456789'

        let allChars = lower + upper + numbers

        // 过滤排除字符
        let validChars = ''
        for (let char of allChars) {
          if (!excludeSet.has(char)) {
            validChars += char
          }
        }

        if (validChars.length === 0) {
          document.getElementById('password-display').innerText = '错误: 所有字符都被排除了'
          return
        }

        let password = ''
        // 使用 crypto.getRandomValues 保证更好的随机性
        const array = new Uint32Array(length)
        window.crypto.getRandomValues(array)

        for (let i = 0; i < length; i++) {
          password += validChars[array[i] % validChars.length]
        }

        document.getElementById('password-display').innerText = password
      }

      // 4. 刷新所有
      function refreshAll() {
        refreshTimestamp()
        refreshFormattedTime()
        refreshPassword()
      }

      // 复制功能
      function copyToClipboard(elementId) {
        const text = document.getElementById(elementId).innerText
        if (text === 'Loading...' || text.startsWith('错误')) {
          return
        }
        function refresh(elementId) {
          switch (elementId) {
            case 'timestamp-display':
              refreshTimestamp()
              break
            case 'password-display':
              refreshPassword()
              break
            case 'formatted-time-display':
              refreshFormattedTime()
              break

            default:
              break
          }
        }
        navigator.clipboard
          .writeText(text)
          .then(() => {
            showToast()
            refresh(elementId)
          })
          .catch(err => {
            console.error('无法复制: ', err)
            // 降级处理
            const textarea = document.createElement('textarea')
            textarea.value = text
            document.body.appendChild(textarea)
            textarea.select()
            document.execCommand('copy')
            document.body.removeChild(textarea)
            showToast()
            refresh(elementId)
          })
      }

      // 显示 Toast 提示
      function showToast() {
        const toast = document.getElementById('toast')
        toast.className = 'show'
        setTimeout(function () {
          toast.className = toast.className.replace('show', '')
        }, 3000)
      }
    </script>
  </body>
</html>
