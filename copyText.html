<!-- 
生成以下功能的html单页面，不使用TailwindCSS，不引入Font，使用默认字体，标题为文案生成器
1、第一个标签页
    - 一个输入框组件，名字：核心组件名称，id为core_name,默认值为空
    - 一个输入域组件，名字：子组件名称，id为core_subName,默认值为空
    - 一个输入框组件，名字：其他要求，id为core_othersText，默认值为‘生成内容中删除核心XXXX单元，只显示XXXX单元，不显示任何地名’
    - 一个生成按钮，根据输入框和输入域生成类似文本（只读）：
    在低空智能网联建设当中，请对XXXX(id为core_name值填入)进行一下解释并生成一段200字内容
    补充内容：XXXX(id为core_name值填入)中包含XXXX（id为core_subName值填入，如果不含有‘、’则需要对core_subName值中换行符替换成‘、’）
    其他要求：默认为无（若id为core_othersText值为空，默认为无，有值则填写入id为core_othersText的值）
    - 一个复制按钮，可以复制根据要求生成的文本
    - 一个清空按钮，可以清空输入框和输入域的文本
    - 一个跳转按钮，可以跳转浏览器到百度网页     
2、第二个标签页
    - 一个输入框组件，名字：接入组件名称，id为name，默认值为空
    - 两个输入域组件，名字分别为业务功能描述和业务流程文字描述，id分别为function_description和text_description，默认值为空
    - 一个输入框组件，名字：其他要求，id为othersText，默认值为‘生成内容中删除核心XXXX单元，只显示XXXX单元，不显示任何地名’
    - 一个生成按钮，根据输入框和输入域生成类似文本（只读）：
    根据业务功能描述和业务流程文字描述，对文本内容进行整理，生成一段对XXXX(id为name值填入)的定义，不少于300字，不用分段
    业务功能描述：XXXX（id为function_description值填入）
    业务流程文字描述：XXXX（id为text_description值填入）
    其他要求：默认为无（若id为othersText值为空，默认为无，有值则填写入id为othersText的值）
    - 一个复制按钮，可以复制根据要求生成的文本
    - 一个清空按钮，可以清空输入框和输入域的文本
    - 一个跳转按钮，可以跳转浏览器到百度网页 

补充要求：标签页之间相互独立，互不影响

-->



<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低空文案生成器</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --border-color: #ddd;
            --hover-color: #357abd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            background-color: var(--secondary-color);
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            outline: none;
        }

        .tab-btn:hover {
            background-color: #eef1f5;
            color: var(--primary-color);
        }

        .tab-btn.active {
            background-color: #fff;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Output Area */
        .output-area {
            background-color: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            min-height: 150px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #444;
            white-space: pre-wrap;
        }

        .output-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            display: block;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button.action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-generate:hover {
            background-color: var(--hover-color);
        }

        .btn-copy {
            background-color: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background-color: #218838;
        }

        .btn-clear {
            background-color: #dc3545;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c82333;
        }

        .btn-jump {
            background-color: #6c757d;
            color: white;
        }

        .btn-jump:hover {
            background-color: #5a6268;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }

            body {
                padding: 0;
            }

            .btn-group {
                flex-direction: column;
            }

            button.action-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Tabs Navigation -->
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab('tab2')">核心组件文案</button>
            <button class="tab-btn" onclick="openTab('tab1')">接入组件文案</button>
        </div>

        <!-- Tab 1 Content -->
        <div id="tab1" class="tab-content">
            <div class="form-group">
                <label for="name">接入组件名称</label>
                <input type="text" id="name" placeholder="请输入组件名称">
            </div>

            <div class="form-group">
                <label for="function_description">业务功能描述</label>
                <textarea id="function_description" placeholder="请输入业务功能描述"></textarea>
            </div>

            <div class="form-group">
                <label for="text_description">业务流程文字描述</label>
                <textarea id="text_description" placeholder="请输入业务流程文字描述"></textarea>
            </div>

            <div class="form-group">
                <label for="othersText">其他要求</label>
                <input type="text" id="othersText" value="生成内容中删除核心XXXX单元，只显示XXXX单元，不显示任何地名" placeholder="可选，默认为无">
            </div>

            <div class="form-group">
                <span class="output-label">生成结果（只读）：</span>
                <div id="output1" class="output-area" readonly></div>
            </div>

            <div class="btn-group">
                <button class="action-btn btn-generate" onclick="generateText1()">生成文案</button>
                <button class="action-btn btn-copy" onclick="copyText('output1')">复制文案</button>
                <button class="action-btn btn-clear" onclick="clearForm1()">清空输入</button>
                <button class="action-btn btn-jump" onclick="jumpToBaidu()">跳转百度</button>
            </div>
        </div>

        <!-- Tab 2 Content -->
        <div id="tab2" class="tab-content active">
            <div class="form-group">
                <label for="core_name">核心组件名称</label>
                <input type="text" id="core_name" placeholder="请输入核心组件名称">
            </div>

            <div class="form-group">
                <label for="core_subName">子组件名称</label>
                <textarea id="core_subName" placeholder="请输入子组件名称，多个可用换行或顿号分隔"></textarea>
            </div>

            <div class="form-group">
                <label for="core_othersText">其他要求</label>
                <input type="text" id="core_othersText" value="生成内容中删除核心XXXX单元，只显示XXXX单元，不显示任何地名">
            </div>

            <div class="form-group">
                <span class="output-label">生成结果（只读）：</span>
                <div id="output2" class="output-area" readonly></div>
            </div>

            <div class="btn-group">
                <button class="action-btn btn-generate" onclick="generateText2()">生成文案</button>
                <button class="action-btn btn-copy" onclick="copyText('output2')">复制文案</button>
                <button class="action-btn btn-clear" onclick="clearForm2()">清空输入</button>
                <button class="action-btn btn-jump" onclick="jumpToBaidu()">跳转百度</button>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching Logic
        function openTab(tabId) {
            // Hide all tab contents
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Deactivate all buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Show selected tab and activate button
            document.getElementById(tabId).classList.add('active');

            // Find the button that called this function (or match by index/text if needed, but here we rely on click event context usually, 
            // however since it's inline onclick, we can just find by index or simple logic. 
            // To keep it simple and robust without passing 'this', we check innerText or index.
            // Better approach: pass event or use querySelector based on tabId mapping)

            if (tabId === 'tab1') {
                buttons[0].classList.add('active');
            } else {
                buttons[1].classList.add('active');
            }
        }

        // Generate Text for Tab 1
        function generateText1() {
            const name = document.getElementById('name').value.trim();
            const funcDesc = document.getElementById('function_description').value.trim();
            const textDesc = document.getElementById('text_description').value.trim();
            let others = document.getElementById('othersText').value.trim();

            if (!others) {
                others = "无";
            }

            const template = `根据业务功能描述和业务流程文字描述，对文本内容进行整理，生成一段对${name}的定义，不少于300字，不用分段
业务功能描述：${funcDesc}
业务流程文字描述：${textDesc}
其他要求：${others}`;

            document.getElementById('output1').innerText = template;
        }

        // Generate Text for Tab 2
        function generateText2() {
            const coreName = document.getElementById('core_name').value.trim();
            let subName = document.getElementById('core_subName').value.trim();
            let others = document.getElementById('core_othersText').value.trim();

            // Process subName: if it doesn't contain '、', replace newlines with '、'
            if (subName && !subName.includes('、')) {
                subName = subName.replace(/\n/g, '、');
            }

            if (!others) {
                others = "无";
            }

            const template = `在低空智能网联建设当中，请对${coreName}进行一下解释并生成一段200字内容
补充内容：${coreName}中包含${subName}
其他要求：${others}`;

            document.getElementById('output2').innerText = template;
        }

        // Copy Text Function
        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            if (!text) {
                alert('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                console.log('已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败: ', err);
                console.log('复制失败，请手动复制');
            });
        }

        // Clear Form 1
        function clearForm1() {
            document.getElementById('name').value = '';
            document.getElementById('function_description').value = '';
            document.getElementById('text_description').value = '';
            document.getElementById('othersText').value = '';
            document.getElementById('output1').innerText = '';
        }

        // Clear Form 2
        function clearForm2() {
            document.getElementById('core_name').value = '';
            document.getElementById('core_subName').value = '';
            // Reset to default value as per requirement description implies clearing user input, 
            // but usually "Clear" resets to initial state. The initial state in HTML is empty, 
            // but the prompt says default value is a specific string. 
            // Let's reset to the specific default string mentioned in the prompt for consistency.
            document.getElementById('core_othersText').value = '生成内容中删除核心XXXX单元，只显示XXXX单元，不显示任何地名';
            document.getElementById('output2').innerText = '';
        }

        // Jump to Baidu
        function jumpToBaidu() {
            window.open('https://www.baidu.com', '_blank');
        }
    </script>

</body>

</html>
